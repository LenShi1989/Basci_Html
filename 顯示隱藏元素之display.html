<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>顯示隱藏元素之display</title>
    <style>
      .baba {
        /* 保留原來位置，不顯示內容 */
        visibility: hidden;
        /* 不保留保留原來位置，不顯示內容 */
        /* display: none; */
        width: 200px;
        height: 200px;
        background-color: pink;
      }

      .mama {
        width: 200px;
        height: 200px;
        background-color: skyblue;
      }
    </style>
  </head>
  <body>
    <div class="baba">豬爸爸</div>
    <div class="mama">豬媽媽</div>
  </body>
</html>
